<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電脳空間テスト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom right, #020617, #312e81, #581c87);
            height: 100vh;
        }

        .cyberspace {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.6;
        }

        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(6, 182, 212, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(1000px) rotateX(60deg);
            transform-origin: center center;
        }

        .circle {
            position: absolute;
            border: 2px solid rgba(6, 182, 212, 0.4);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        .circle1 { width: 150px; height: 150px; top: 20%; left: 10%; animation-delay: 0s; }
        .circle2 { width: 200px; height: 200px; top: 50%; left: 60%; animation-delay: 0.5s; }
        .circle3 { width: 100px; height: 100px; top: 70%; left: 30%; animation-delay: 1s; }
        .circle4 { width: 180px; height: 180px; top: 30%; left: 70%; animation-delay: 1.5s; }
        .circle5 { width: 120px; height: 120px; top: 60%; left: 80%; animation-delay: 2s; }

        .center-circles {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .big-circle {
            width: 800px;
            height: 800px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .medium-circle {
            width: 600px;
            height: 600px;
            border: 2px solid rgba(236, 72, 153, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 30s linear infinite;
        }

        .small-circle {
            width: 400px;
            height: 400px;
            border: 2px solid rgba(6, 182, 212, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin-reverse 20s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: translate(-50%, -50%) rotate(360deg); }
            to { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: monospace;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
        }
    </style>
</head>
<body>
    <div class="cyberspace">
        <!-- グリッド線 -->
        <div class="grid"></div>

        <!-- ランダムサークル -->
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        <div class="circle circle4"></div>
        <div class="circle circle5"></div>

        <!-- 中央の回転サークル -->
        <div class="center-circles">
            <div class="big-circle"></div>
            <div class="medium-circle"></div>
            <div class="small-circle"></div>
        </div>
    </div>

    <div class="content">
        🤖 電脳空間テスト
    </div>
</body>
</html>
